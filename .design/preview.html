<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login ConectAr</title>

<style>
:root {
  --text: #1e1e1e;
  --subtext: rgba(0,0,0,0.6);
  --card: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.3);
  --primary: #2f6fed;
}

@media (prefers-color-scheme: dark) {
  :root {
    --text: #f1f5f9;
    --subtext: rgba(255,255,255,0.6);
    --card: rgba(15,23,42,0.35);
    --border: rgba(255,255,255,0.15);
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  background: url('fondo_conectar.webp') no-repeat center center;
  background-size: cover;
}

/* CARD */
.login-container {
  width: 100%;
  max-width: 420px;
  padding: 40px 30px;
  border-radius: 20px;

  background: var(--card);
  backdrop-filter: blur(20px);

  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);

  text-align: center;
}

/* LOGO */
.logo {
  width: 80px;
  margin-bottom: 10px;
}

/* MARCA */
.brand img {
  height: 42px;
  margin-bottom: 10px;
}

/* TAGLINE */
.tagline {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--subtext);
  margin-bottom: 30px;
}

/* INPUTS */
.input-group {
  text-align: left;
  margin-bottom: 20px;
}

label {
  font-size: 12px;
  color: var(--subtext);
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 12px;

  border: 1px solid var(--border);
  background: rgba(255,255,255,0.2);
  color: var(--text);
}

input:focus {
  outline: none;
  border-color: var(--primary);
}

/* LINK */
.forgot {
  font-size: 12px;
  text-align: right;
  margin-top: 8px;
  color: var(--subtext);
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;

  border: none;
  border-radius: 14px;

  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  font-size: 16px;
  cursor: pointer;

  box-shadow: 0 10px 25px rgba(37,99,235,0.4);
}

button:hover {
  transform: translateY(-1px);
}
</style>

</head>

<body>

<div class="login-container">

  <!-- LOGOTIPO -->
  <img src="Logotipo_ConectAr.png" class="logo">

  <!-- MARCA (con nuevo contorno Ar aplicado en el archivo) -->
  <div class="brand">
    <img src="Marca_ConectAr.png">
  </div>

  <!-- TAGLINE -->
  <div class="tagline">
    GESTIÓN HUMANA, CONECTADA
  </div>

  <!-- FORM -->
  <div class="input-group">
    <label>EMAIL</label>
    <input type="email" placeholder="admin@empresa.com">
  </div>

  <div class="input-group">
    <label>CONTRASEÑA</label>
    <input type="password" placeholder="••••••••">
  </div>

  <div class="forgot">
    ¿Olvidaste tu contraseña?
  </div>

  <button>Iniciar Sesión</button>

</div>

</body>
</html>
